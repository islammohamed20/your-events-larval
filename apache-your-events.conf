# Apache Virtual Host Configuration for Your Events
# Copy this file to /etc/apache2/sites-available/ on the new server
# Then run: a2ensite your-events.conf && systemctl reload apache2

<VirtualHost *:8090>
    # Server Configuration
    ServerName your-events.local
    ServerAlias www.your-events.local
    DocumentRoot /var/www/your-events/public
    
    # Directory Configuration
    <Directory /var/www/your-events/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Laravel URL Rewriting
        RewriteEngine On
        
        # Handle Authorization Header
        RewriteCond %{HTTP:Authorization} .
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
        
        # Redirect Trailing Slashes If Not A Folder
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} (.+)/$
        RewriteRule ^ %1 [L,R=301]
        
        # Send Requests To Front Controller
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>
    
    # Security Headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # HTTPS Security (uncomment when using SSL)
    # Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    
    # Content Security Policy
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
    
    # File Upload Security
    <FilesMatch "\.(php|phtml|php3|php4|php5|pl|py|jsp|asp|sh|cgi)$">
        <RequireAll>
            Require all denied
        </RequireAll>
    </FilesMatch>
    
    # Allow PHP files only in specific directories
    <Directory /var/www/your-events/public>
        <FilesMatch "\.php$">
            Require all granted
        </FilesMatch>
    </Directory>
    
    # Deny access to sensitive files
    <FilesMatch "^\.(env|htaccess|htpasswd|ini|log|sh|sql|conf)$">
        Require all denied
    </FilesMatch>
    
    # Deny access to version control directories
    <DirectoryMatch "/\.(git|svn|hg)/">
        Require all denied
    </DirectoryMatch>
    
    # Deny access to Laravel sensitive directories
    <Directory /var/www/your-events/storage>
        Require all denied
    </Directory>
    
    <Directory /var/www/your-events/bootstrap/cache>
        Require all denied
    </Directory>
    
    # Enable compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
    </IfModule>
    
    # Set cache headers for static files
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/gif "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/pdf "access plus 1 month"
        ExpiresByType text/javascript "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-javascript "access plus 1 month"
        ExpiresByType image/x-icon "access plus 1 year"
    </IfModule>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/your-events_error.log
    CustomLog ${APACHE_LOG_DIR}/your-events_access.log combined
    
    # Log Level (change to 'warn' in production)
    LogLevel info
</VirtualHost>

# Optional: Redirect HTTP to HTTPS (uncomment when SSL is configured)
# <VirtualHost *:80>
#     ServerName your-events.local
#     ServerAlias www.your-events.local
#     Redirect permanent / https://your-events.local/
# </VirtualHost>

