# =============================================================================
# Archive Migration Configuration File (English)
# Configuration for Website Migration via Compressed Archives
# =============================================================================

# Basic Archive Settings
# =====================

# Default backup directory
BACKUP_DIR="./website-backup-$(date +%Y%m%d_%H%M%S)"

# Archive names
ARCHIVE_NAME="website-migration-$(date +%Y%m%d_%H%M%S).tar.gz"
DB_ARCHIVE_NAME="database-backup-$(date +%Y%m%d_%H%M%S).sql.gz"

# Compression level (1-9, where 9 is maximum compression)
COMPRESS_LEVEL=6

# Migration Options
# ================

# Include/exclude options
INCLUDE_DATABASE=true
INCLUDE_FILES=true
INCLUDE_VENDOR=false
INCLUDE_NODE_MODULES=false
INCLUDE_LOGS=false

# File Exclusion Patterns
# =======================

# Default exclusion patterns (space-separated)
EXCLUDE_PATTERNS=(
    "node_modules"
    ".git"
    ".env"
    "storage/logs/*"
    "storage/framework/cache/*"
    "storage/framework/sessions/*"
    "storage/framework/views/*"
    "vendor"
    "*.log"
    ".DS_Store"
    "Thumbs.db"
    "*.tmp"
    "*.cache"
    ".vscode"
    ".idea"
)

# Custom exclusion patterns (add your own)
CUSTOM_EXCLUDE_PATTERNS=(
    # "custom-folder"
    # "*.backup"
)

# Database Settings
# ================

# MySQL dump options
MYSQLDUMP_OPTIONS="--single-transaction --routines --triggers --add-drop-table"

# Include data in database backup
INCLUDE_DB_DATA=true

# Compress database backup
COMPRESS_DB=true

# Security Settings
# ================

# Enable archive encryption (requires gpg)
ENCRYPT_ARCHIVE=false
ENCRYPTION_RECIPIENT="your-email@example.com"

# Generate checksums for verification
GENERATE_CHECKSUMS=true

# Cleanup Settings
# ===============

# Remove temporary files after archive creation
CLEANUP_TEMP_FILES=true

# Keep backup directory after archive creation
KEEP_BACKUP_DIR=false

# Notification Settings
# ====================

# Enable email notifications (requires mail command)
EMAIL_NOTIFICATIONS=false
NOTIFY_EMAIL="admin@example.com"

# Enable Slack notifications (requires webhook URL)
SLACK_NOTIFICATIONS=false
SLACK_WEBHOOK_URL=""

# Advanced Options
# ===============

# Enable debug mode
DEBUG_MODE=false

# Dry run mode (show what would be done without executing)
DRY_RUN=false

# Parallel compression (for large files)
PARALLEL_COMPRESSION=false

# Maximum archive size (in MB, 0 = unlimited)
MAX_ARCHIVE_SIZE=0

# Split large archives
SPLIT_ARCHIVES=false
SPLIT_SIZE="1000M"

# Validation Settings
# ==================

# Verify database integrity before backup
VERIFY_DB_INTEGRITY=true

# Check available disk space
CHECK_DISK_SPACE=true
MIN_FREE_SPACE_GB=2

# Verify Laravel files
VERIFY_LARAVEL_FILES=true

# Logging Settings
# ===============

# Enable detailed logging
ENABLE_LOGGING=true
LOG_FILE="./migration-$(date +%Y%m%d_%H%M%S).log"

# Log level (DEBUG, INFO, WARNING, ERROR)
LOG_LEVEL="INFO"

# Restoration Settings
# ===================

# Default restoration directory
DEFAULT_RESTORE_DIR="./restored-website"

# Create backup before restoration
BACKUP_BEFORE_RESTORE=true

# Laravel post-restoration commands
LARAVEL_POST_RESTORE_COMMANDS=(
    "composer install --no-dev --optimize-autoloader"
    "php artisan key:generate"
    "php artisan storage:link"
    "php artisan migrate --force"
    "php artisan config:cache"
    "php artisan route:cache"
    "php artisan view:cache"
)

# Environment-specific Settings
# ============================

# Update .env file during restoration
UPDATE_ENV_FILE=true

# Environment variables to update
ENV_UPDATES=(
    "APP_ENV=production"
    "APP_DEBUG=false"
    "APP_URL=https://your-new-domain.com"
)

# Performance Settings
# ===================

# Use rsync for file operations (faster for large files)
USE_RSYNC=false

# Enable caching for repeated operations
ENABLE_CACHING=true

# Number of parallel processes
PARALLEL_PROCESSES=4

# Integration Settings
# ===================

# Pre-migration script
PRE_MIGRATION_SCRIPT=""

# Post-migration script
POST_MIGRATION_SCRIPT=""

# Custom hooks directory
HOOKS_DIR="./migration-hooks"

# Reporting Settings
# =================

# Generate migration report
GENERATE_REPORT=true
REPORT_FORMAT="txt"  # txt, json, html

# Include system information in report
INCLUDE_SYSTEM_INFO=true

# Include file statistics
INCLUDE_FILE_STATS=true

# =============================================================================
# Usage Examples:
# 
# 1. Basic backup:
#    ./migrate-via-archive-en.sh create-backup
# 
# 2. Database only:
#    ./migrate-via-archive-en.sh create-backup --db-only
# 
# 3. Files only:
#    ./migrate-via-archive-en.sh create-backup --files-only
# 
# 4. Full archive with custom settings:
#    ./migrate-via-archive-en.sh full-archive -c archive-migration-config-en.conf
# 
# 5. Restore from archive:
#    ./migrate-via-archive-en.sh restore-backup website-migration-20240101_120000.tar.gz
# 
# =============================================================================