# =============================================================================
# ملف إعدادات النقل عبر الأرشيف
# Archive Migration Configuration File
# =============================================================================

# إعدادات الأرشيف الأساسية
# Basic Archive Settings
# ----------------------

# مجلد النسخ الاحتياطية (افتراضي: ./website-backup-DATE)
BACKUP_DIR="./website-backup-$(date +%Y%m%d_%H%M%S)"

# اسم الأرشيف النهائي (افتراضي: website-migration-DATE.tar.gz)
ARCHIVE_NAME="website-migration-$(date +%Y%m%d_%H%M%S).tar.gz"

# اسم أرشيف قاعدة البيانات (افتراضي: database-backup-DATE.sql.gz)
DB_ARCHIVE_NAME="database-backup-$(date +%Y%m%d_%H%M%S).sql.gz"

# مستوى الضغط (1-9، حيث 9 أعلى ضغط لكن أبطأ)
COMPRESS_LEVEL=6

# عرض تفاصيل أكثر أثناء العملية
VERBOSE=false

# إعدادات النقل
# Migration Settings
# ------------------

# نقل قاعدة البيانات فقط
DB_ONLY=false

# نقل الملفات فقط
FILES_ONLY=false

# تضمين ملفات vendor (مكتبات Composer)
INCLUDE_VENDOR=false

# تضمين ملفات node_modules
INCLUDE_NODE_MODULES=false

# تضمين ملفات السجلات
INCLUDE_LOGS=false

# الملفات والمجلدات المستبعدة
# Excluded Files and Folders
# ---------------------------

# أنماط الاستبعاد (يمكن إضافة المزيد)
EXCLUDE_PATTERNS=(
    "*.tmp"
    "*.cache"
    "*.bak"
    "*.old"
    ".DS_Store"
    "Thumbs.db"
    "desktop.ini"
    "*.swp"
    "*.swo"
    "*~"
)

# مجلدات إضافية للاستبعاد
EXCLUDE_DIRS=(
    "temp"
    "tmp"
    "cache"
    "backup"
    "backups"
)

# إعدادات قاعدة البيانات
# Database Settings
# -----------------

# خيارات إضافية لـ mysqldump
MYSQLDUMP_OPTIONS="--single-transaction --routines --triggers --add-drop-table"

# تضمين البيانات (true) أم الهيكل فقط (false)
INCLUDE_DATA=true

# ضغط ملف قاعدة البيانات
COMPRESS_DATABASE=true

# إعدادات الأمان
# Security Settings
# -----------------

# تشفير الأرشيف (يتطلب gpg)
ENCRYPT_ARCHIVE=false

# مفتاح التشفير (إذا كان التشفير مفعلاً)
ENCRYPTION_KEY=""

# إنشاء checksum للتحقق من سلامة الملفات
CREATE_CHECKSUM=true

# إعدادات التنظيف
# Cleanup Settings
# ----------------

# حذف الملفات المؤقتة بعد إنشاء الأرشيف
CLEANUP_TEMP_FILES=true

# الاحتفاظ بعدد معين من النسخ الاحتياطية
KEEP_BACKUPS=5

# حذف النسخ الاحتياطية القديمة تلقائياً
AUTO_CLEANUP_OLD_BACKUPS=true

# إعدادات الإشعارات
# Notification Settings
# ---------------------

# إرسال إشعار عند اكتمال العملية
SEND_NOTIFICATION=false

# البريد الإلكتروني للإشعارات
NOTIFICATION_EMAIL=""

# رسالة مخصصة للإشعار
NOTIFICATION_MESSAGE="تم إنشاء أرشيف الموقع بنجاح"

# إعدادات متقدمة
# Advanced Settings
# -----------------

# استخدام الضغط المتوازي (إذا كان متوفراً)
USE_PARALLEL_COMPRESSION=true

# عدد المعالجات المستخدمة للضغط
COMPRESSION_THREADS=4

# حد أقصى لحجم الأرشيف (بالميجابايت، 0 = بلا حدود)
MAX_ARCHIVE_SIZE=0

# تقسيم الأرشيف إلى أجزاء إذا تجاوز الحد الأقصى
SPLIT_ARCHIVE=false

# حجم كل جزء (بالميجابايت)
SPLIT_SIZE=1000

# إعدادات التحقق
# Validation Settings
# -------------------

# التحقق من سلامة قاعدة البيانات قبل النسخ
VALIDATE_DATABASE=true

# التحقق من مساحة القرص المتوفرة
CHECK_DISK_SPACE=true

# الحد الأدنى للمساحة المطلوبة (بالميجابايت)
MIN_DISK_SPACE=1000

# التحقق من صحة ملفات Laravel
VALIDATE_LARAVEL_FILES=true

# إعدادات السجلات
# Logging Settings
# ----------------

# إنشاء ملف سجل للعملية
CREATE_LOG=true

# مجلد ملفات السجل
LOG_DIR="./logs"

# اسم ملف السجل
LOG_FILE="migration-$(date +%Y%m%d_%H%M%S).log"

# مستوى السجل (DEBUG, INFO, WARNING, ERROR)
LOG_LEVEL="INFO"

# إعدادات الاستعادة
# Restoration Settings
# --------------------

# المجلد الافتراضي للاستعادة
DEFAULT_RESTORE_DIR="./restored-website"

# إنشاء نسخة احتياطية قبل الاستعادة
BACKUP_BEFORE_RESTORE=true

# تشغيل أوامر Laravel بعد الاستعادة
RUN_LARAVEL_COMMANDS=true

# أوامر Laravel المطلوب تشغيلها بعد الاستعادة
LARAVEL_POST_RESTORE_COMMANDS=(
    "composer install --no-dev --optimize-autoloader"
    "php artisan key:generate"
    "php artisan config:cache"
    "php artisan route:cache"
    "php artisan view:cache"
    "php artisan storage:link"
    "php artisan migrate --force"
)

# إعدادات خاصة بالبيئة
# Environment Specific Settings
# ------------------------------

# بيئة التطبيق (production, staging, development)
APP_ENV="production"

# تحديث ملف .env تلقائياً
UPDATE_ENV_FILE=true

# إعدادات .env الجديدة (ستحل محل القيم الموجودة)
NEW_ENV_SETTINGS=(
    # "APP_URL=https://new-domain.com"
    # "DB_HOST=new-db-host"
    # "DB_DATABASE=new_database_name"
    # "MAIL_HOST=new-mail-host"
)

# إعدادات الأداء
# Performance Settings
# --------------------

# استخدام rsync للنسخ السريع (إذا كان متوفراً)
USE_RSYNC=true

# خيارات rsync
RSYNC_OPTIONS="-avz --progress"

# استخدام الذاكرة المؤقتة للتسريع
USE_CACHE=true

# حجم الذاكرة المؤقتة (بالميجابايت)
CACHE_SIZE=512

# إعدادات التكامل
# Integration Settings
# --------------------

# تشغيل سكريبت مخصص قبل النسخ
PRE_BACKUP_SCRIPT=""

# تشغيل سكريبت مخصص بعد النسخ
POST_BACKUP_SCRIPT=""

# تشغيل سكريبت مخصص قبل الاستعادة
PRE_RESTORE_SCRIPT=""

# تشغيل سكريبت مخصص بعد الاستعادة
POST_RESTORE_SCRIPT=""

# إعدادات التقارير
# Reporting Settings
# ------------------

# إنشاء تقرير مفصل
CREATE_REPORT=true

# تضمين إحصائيات الملفات
INCLUDE_FILE_STATS=true

# تضمين معلومات النظام
INCLUDE_SYSTEM_INFO=true

# تضمين معلومات قاعدة البيانات
INCLUDE_DATABASE_INFO=true

# =============================================================================
# ملاحظات الاستخدام
# Usage Notes
# =============================================================================

# لاستخدام هذا الملف:
# 1. انسخ هذا الملف وعدل الإعدادات حسب احتياجاتك
# 2. شغل السكريبت مع تحديد ملف الإعدادات:
#    ./migrate-via-archive.sh -c archive-migration-config.conf full-archive

# أمثلة للاستخدام:
# - إنشاء أرشيف كامل: ./migrate-via-archive.sh full-archive
# - نسخ قاعدة البيانات فقط: ./migrate-via-archive.sh create-backup --db-only
# - نسخ الملفات فقط: ./migrate-via-archive.sh create-backup --files-only
# - استعادة من أرشيف: ./migrate-via-archive.sh restore-backup archive.tar.gz

# للحصول على مساعدة كاملة:
# ./migrate-via-archive.sh --help