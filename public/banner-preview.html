<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة البانر الدعائي</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .banner-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 1240px;
            width: 100%;
        }
        
        .banner {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .title {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .description {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .banner-container {
                margin: 10px;
                padding: 15px;
            }
            
            .title {
                font-size: 2rem;
            }
            
            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">البانر الدعائي لموقع الفعاليات</h1>
    
    <div class="banner-container">
        <img src="images/promotional-banner.svg" alt="بانر دعائي للفعاليات" class="banner">
    </div>
    
    <p class="description">
        بانر دعائي أفقي بتصميم احترافي يتضمن رجل سعودي يرتدي الثوب والغترة مع نظارة الواقع الافتراضي<br>
        مع خلفية بتدرج أزرق داكن ونص عربي أنيق وزر دعوة لاتخاذ إجراء
    </p>
</body>
</html>
