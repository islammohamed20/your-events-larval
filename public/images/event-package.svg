<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="packageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e9ecef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dee2e6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Event Elements Gradient -->
    <linearGradient id="eventGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4870;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c71d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dbcae;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#packageBg)"/>
  
  <!-- Event Stage/Platform -->
  <ellipse cx="200" cy="250" rx="150" ry="30" fill="#1f144a" opacity="0.3"/>
  <rect x="100" y="200" width="200" height="50" rx="10" fill="url(#eventGradient)" filter="url(#glow)"/>
  
  <!-- Event Elements -->
  <g transform="translate(200, 150)">
    <!-- Main Event Symbol -->
    <circle cx="0" cy="0" r="40" fill="#1f144a" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="url(#eventGradient)"/>
    
    <!-- Event Icons -->
    <g fill="#ffffff">
      <!-- Music Note -->
      <path d="M-15 -10 Q-15 -20 -5 -20 L5 -20 Q15 -20 15 -10 L15 10 Q15 20 5 20 L-5 20 Q-15 20 -15 10 Z" opacity="0.8"/>
      <circle cx="-8" cy="0" r="3"/>
      <circle cx="8" cy="0" r="3"/>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g>
    <!-- Balloons -->
    <ellipse cx="80" cy="100" rx="12" ry="18" fill="#ef4870">
      <animate attributeName="cy" values="100;95;100" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <line x1="80" y1="118" x2="80" y2="140" stroke="#666" stroke-width="1"/>
    
    <ellipse cx="320" cy="80" rx="12" ry="18" fill="#2dbcae">
      <animate attributeName="cy" values="80;75;80" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <line x1="320" y1="98" x2="320" y2="120" stroke="#666" stroke-width="1"/>
    
    <!-- Confetti -->
    <rect x="150" y="50" width="8" height="8" fill="#f0c71d" transform="rotate(45 154 54)">
      <animate attributeName="y" values="50;60;50" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="250" y="70" width="6" height="6" fill="#ef4870" transform="rotate(30 253 73)">
      <animate attributeName="y" values="70;80;70" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="180" width="5" height="5" fill="#2dbcae" transform="rotate(60 122.5 182.5)">
      <animate attributeName="y" values="180;190;180" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Event Lights -->
  <g opacity="0.6">
    <circle cx="100" cy="50" r="20" fill="url(#eventGradient)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="40" r="25" fill="url(#eventGradient)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Package Features Icons -->
  <g transform="translate(50, 220)">
    <!-- Camera Icon -->
    <rect x="0" y="0" width="25" height="18" rx="3" fill="#1f144a"/>
    <circle cx="12.5" cy="9" r="5" fill="#f8f9fa"/>
    <circle cx="12.5" cy="9" r="3" fill="#1f144a"/>
  </g>
  
  <g transform="translate(325, 220)">
    <!-- Sound Icon -->
    <path d="M0 5 L5 0 L5 15 L0 10 Z" fill="#1f144a"/>
    <path d="M8 3 Q12 3 12 7.5 Q12 12 8 12" stroke="#1f144a" stroke-width="2" fill="none"/>
    <path d="M10 1 Q16 1 16 7.5 Q16 14 10 14" stroke="#1f144a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Elegant Border -->
  <rect x="5" y="5" width="390" height="290" rx="15" fill="none" stroke="url(#eventGradient)" stroke-width="2" opacity="0.5"/>
</svg>