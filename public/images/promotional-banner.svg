<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1a5e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1f144a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a25;stop-opacity:1" />
    </linearGradient>
    
    <!-- VR Glow Effect -->
    <filter id="vrGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- Button Gradient -->
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dbcae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3cc7b8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Light Effects -->
    <radialGradient id="lightEffect1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="lightEffect2" cx="80%" cy="70%" r="30%">
      <stop offset="0%" style="stop-color:#2dbcae;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2dbcae;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Light Effects -->
  <rect width="1200" height="400" fill="url(#lightEffect1)"/>
  <rect width="1200" height="400" fill="url(#lightEffect2)"/>
  
  <!-- Saudi Man Character -->
  <g transform="translate(100, 50)">
    <!-- Body (Thobe) -->
    <path d="M150 320 L150 180 Q150 160 170 160 L230 160 Q250 160 250 180 L250 320 Q250 340 230 340 L170 340 Q150 340 150 320 Z" fill="#ffffff" stroke="#f0f0f0" stroke-width="2"/>
    
    <!-- Arms -->
    <ellipse cx="130" cy="200" rx="15" ry="40" fill="#ffffff" transform="rotate(-20 130 200)"/>
    <ellipse cx="270" cy="200" rx="15" ry="40" fill="#ffffff" transform="rotate(20 270 200)"/>
    
    <!-- Hands (Gesturing) -->
    <circle cx="110" cy="180" r="12" fill="#d4a574"/>
    <circle cx="290" cy="180" r="12" fill="#d4a574"/>
    
    <!-- Head -->
    <circle cx="200" cy="120" r="35" fill="#d4a574"/>
    
    <!-- Ghutra (Red and White Checkered) -->
    <path d="M165 85 Q200 75 235 85 L240 110 Q200 100 160 110 Z" fill="#ffffff"/>
    <path d="M165 85 Q200 75 235 85 L240 110 Q200 100 160 110 Z" fill="url(#redPattern)" opacity="0.7"/>
    
    <!-- Agal (Black Headband) -->
    <ellipse cx="200" cy="95" rx="40" ry="8" fill="#000000"/>
    
    <!-- VR Headset -->
    <rect x="170" y="105" width="60" height="25" rx="12" fill="#2a2a2a" filter="url(#vrGlow)"/>
    <rect x="175" y="108" width="50" height="19" rx="8" fill="#1a1a1a"/>
    
    <!-- VR Lenses -->
    <circle cx="185" cy="117" r="8" fill="#00ffff" opacity="0.8"/>
    <circle cx="215" cy="117" r="8" fill="#00ffff" opacity="0.8"/>
    
    <!-- VR Strap -->
    <path d="M170 117 Q150 117 150 130 Q150 140 170 140" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M230 117 Q250 117 250 130 Q250 140 230 140" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Facial Features (Smile) -->
    <path d="M185 135 Q200 145 215 135" stroke="#b8956a" stroke-width="2" fill="none"/>
    
    <!-- Beard -->
    <path d="M175 140 Q200 155 225 140 Q225 150 200 155 Q175 150 175 140" fill="#8b7355"/>
  </g>
  
  <!-- Red Pattern for Ghutra -->
  <defs>
    <pattern id="redPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#ffffff"/>
      <rect width="5" height="5" fill="#cc0000"/>
      <rect x="5" y="5" width="5" height="5" fill="#cc0000"/>
    </pattern>
  </defs>
  
  <!-- VR Interaction Effects -->
  <g transform="translate(100, 50)">
    <!-- Floating VR Elements -->
    <circle cx="80" cy="150" r="4" fill="#00ffff" opacity="0.6">
      <animate attributeName="cy" values="150;140;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="170" r="3" fill="#ff6b9d" opacity="0.6">
      <animate attributeName="cy" values="170;160;170" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="120" r="2" fill="#ffd700" opacity="0.7">
      <animate attributeName="cy" values="120;110;120" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text Area -->
  <g transform="translate(650, 100)">
    <!-- Main Heading -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="start">
      <tspan x="0" dy="0">حوّل مناسبتك العادية</tspan>
      <tspan x="0" dy="60">إلى لحظة استثنائية</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="start">
      <tspan x="0" dy="0">تجربة واقع افتراضي مذهلة</tspan>
      <tspan x="0" dy="35">لجعل فعاليتك لا تُنسى</tspan>
    </text>
    
    <!-- CTA Button -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="180" height="50" rx="25" fill="url(#buttonGradient)" stroke="#ffffff" stroke-width="2">
        <animate attributeName="fill" values="url(#buttonGradient);#3cc7b8;url(#buttonGradient)" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="90" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">احجز الآن</text>
      
      <!-- Button Icon -->
      <g transform="translate(20, 15)">
        <path d="M0 10 L8 5 L8 8 L15 8 L15 12 L8 12 L8 15 Z" fill="#ffffff"/>
      </g>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <!-- Geometric Shapes -->
    <circle cx="1050" cy="80" r="30" fill="none" stroke="#2dbcae" stroke-width="2"/>
    <rect x="1100" y="300" width="40" height="40" fill="none" stroke="#ff6b9d" stroke-width="2" transform="rotate(45 1120 320)"/>
    <polygon points="950,350 970,330 990,350 970,370" fill="none" stroke="#ffd700" stroke-width="2"/>
  </g>
  
  <!-- Subtle Glow Effects -->
  <circle cx="200" cy="170" r="100" fill="url(#lightEffect1)" opacity="0.1"/>
  <circle cx="900" cy="200" r="80" fill="url(#lightEffect2)" opacity="0.15"/>
</svg>