<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة Categories - موبايل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 50%, #f8f9fa 100%);
        }
        .category-mobile-card:active .category-mobile-wrapper {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <div class="d-inline-block mb-3" style="padding: 8px 24px; background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%); border-radius: 50px; border: 1px solid rgba(102, 126, 234, 0.2);">
                <span style="color: #667eea; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;">
                    <i class="fas fa-th-large me-2"></i>استكشف عالمنا
                </span>
            </div>
            <h2 style="color: #1a202c; font-weight: 800; font-size: 2rem;">فئات الخدمات</h2>
        </div>

        <div class="row g-3">
            <!-- العاب ايات -->
            <div class="col-6">
                <a href="#" class="category-mobile-card text-decoration-none d-block">
                    <div class="category-mobile-wrapper" style="
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        border-radius: 16px;
                        padding: 20px 16px;
                        text-align: center;
                        position: relative;
                        overflow: hidden;
                        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
                        transition: all 0.3s ease;
                        min-height: 140px;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                    ">
                        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none;"></div>
                        
                        <div class="mb-2" style="position: relative; z-index: 2;">
                            <i class="fas fa-gamepad" style="font-size: 50px; color: white; opacity: 0.95;"></i>
                        </div>
                        
                        <h3 style="color: #ffffff; font-size: 1rem; font-weight: 700; margin: 0; position: relative; z-index: 2; line-height: 1.3;">
                            العاب ايات
                        </h3>
                        
                        <div style="color: rgba(255,255,255,0.85); font-size: 0.75rem; font-weight: 500; position: relative; z-index: 2;">
                            5 خدمة
                        </div>
                        
                        <div style="position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
                    </div>
                </a>
            </div>

            <!-- المتجر -->
            <div class="col-6">
                <a href="#" class="category-mobile-card text-decoration-none d-block">
                    <div class="category-mobile-wrapper" style="
                        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
                        border-radius: 16px;
                        padding: 20px 16px;
                        text-align: center;
                        position: relative;
                        overflow: hidden;
                        box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
                        transition: all 0.3s ease;
                        min-height: 140px;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                    ">
                        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none;"></div>
                        
                        <div class="mb-2" style="position: relative; z-index: 2;">
                            <i class="fas fa-store" style="font-size: 50px; color: white; opacity: 0.95;"></i>
                        </div>
                        
                        <h3 style="color: #ffffff; font-size: 1rem; font-weight: 700; margin: 0; position: relative; z-index: 2; line-height: 1.3;">
                            المتجر
                        </h3>
                        
                        <div style="color: rgba(255,255,255,0.85); font-size: 0.75rem; font-weight: 500; position: relative; z-index: 2;">
                            8 خدمة
                        </div>
                        
                        <div style="position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
                    </div>
                </a>
            </div>

            <!-- كنتريكو لليلات -->
            <div class="col-6">
                <a href="#" class="category-mobile-card text-decoration-none d-block">
                    <div class="category-mobile-wrapper" style="
                        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
                        border-radius: 16px;
                        padding: 20px 16px;
                        text-align: center;
                        position: relative;
                        overflow: hidden;
                        box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
                        transition: all 0.3s ease;
                        min-height: 140px;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                    ">
                        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none;"></div>
                        
                        <div class="mb-2" style="position: relative; z-index: 2;">
                            <i class="fas fa-truck" style="font-size: 50px; color: white; opacity: 0.95;"></i>
                        </div>
                        
                        <h3 style="color: #ffffff; font-size: 1rem; font-weight: 700; margin: 0; position: relative; z-index: 2; line-height: 1.3;">
                            كنتريكو لليلات
                        </h3>
                        
                        <div style="color: rgba(255,255,255,0.85); font-size: 0.75rem; font-weight: 500; position: relative; z-index: 2;">
                            3 خدمة
                        </div>
                        
                        <div style="position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
                    </div>
                </a>
            </div>

            <!-- المصورين -->
            <div class="col-6">
                <a href="#" class="category-mobile-card text-decoration-none d-block">
                    <div class="category-mobile-wrapper" style="
                        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
                        border-radius: 16px;
                        padding: 20px 16px;
                        text-align: center;
                        position: relative;
                        overflow: hidden;
                        box-shadow: 0 4px 15px rgba(250, 112, 154, 0.3);
                        transition: all 0.3s ease;
                        min-height: 140px;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                    ">
                        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none;"></div>
                        
                        <div class="mb-2" style="position: relative; z-index: 2;">
                            <i class="fas fa-camera" style="font-size: 50px; color: white; opacity: 0.95;"></i>
                        </div>
                        
                        <h3 style="color: #ffffff; font-size: 1rem; font-weight: 700; margin: 0; position: relative; z-index: 2; line-height: 1.3;">
                            المصورين
                        </h3>
                        
                        <div style="color: rgba(255,255,255,0.85); font-size: 0.75rem; font-weight: 500; position: relative; z-index: 2;">
                            12 خدمة
                        </div>
                        
                        <div style="position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
                    </div>
                </a>
            </div>
        </div>

        <div class="alert alert-info mt-4 text-center">
            <i class="fas fa-mobile-alt me-2"></i>
            هذه معاينة لتصميم الموبايل فقط
        </div>
    </div>
</body>
</html>
